<p>
    Para insertar un vínculo utilizamos el elemento <code>&lt;a&gt;</code> (anchor) y el atributo <code>href</code> (hypertext reference). El valor del atributo <code>href</code> es la URL a la que se dirigirá el usuario al hacer clic en el enlace. Por ejemplo:
</p>

<a href="https://chatgpt.com/" target="_blank">ChatGPT</a>
<a href="https://claude.ai/new" target="_blank">Claude</a>
<a href="https://gemini.google.com/app" target="_blank">Gemini</a>

<p>
    Insertar una imagen y convertirla en enlace
</p>

<a href="https://chat.qwen.ai/" target="_blank">
    <img src="qwen-logo.png" alt="Logo de Qwen">
</a>
